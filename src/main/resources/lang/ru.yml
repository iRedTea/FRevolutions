############################################################
# +------------------------------------------------------+ #
# |                  Файл локализации                    | #
# +------------------------------------------------------+ #
############################################################
#Любое сообщение может быть, как списком
#(
#message:
#- '1'
#- '2'
#)
#так и строкой (message: 'String'). Поддерживается формат
#json-сообщений (например, для действий при клике на слово в
#чате).
#json-конструктор для Minecraft: https://www.minecraftjson.com
#Плейсхолдеры из PlaceholderAPI также поддерживаются!

langTitle:
  #На какой язык направлена локализация
  language: ru
  #Автор локализации
  author: itzRedTea
  #Версия локализации
  version: 1.0
  #Версия плагина, под которую сделана локализация
  pluginVersion: 0.0.0.0

messages:

  #Сообщение при перезагрузки плагина
  reload: '&2&l[!] &aПлагин успешно перезагружен за %time% ms!'

  #Сообщение при отсутствии прав
  noPermissions: '&4&l[!] &cУ вас нет прав!'

  #Сообщение при неправильном использовании команд
  usage:
    title: '&a[- Использование команды %command% -]'
    format: '&a- &e/%command% %alias% - %description%'
    invalidUsage: 'Неправильное использование команды! Напишите /rev help, для просмотра списка команд.'
